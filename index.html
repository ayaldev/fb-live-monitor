<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fb-live-monitor</title>
    <!-- Sharp, readable monospace font for that boxy utility tool feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --border-color: #ffffff;
            --accent-blue: #0055ff;
            --accent-green: #00ff66;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-mono);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Borderless Full-Page Responsive Wrapper */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Top-Right Overlay Notification Stack */
        #notification-stack {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 380px;
            width: calc(100% - 30px);
        }

        .console-toast {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 14px;
            font-size: 12px;
            line-height: 1.4;
            border-radius: 0px;
            /* Completely Boxy */
            box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(-5px);
            animation: toastEnter 0.2s forwards;
            word-break: break-all;
        }

        .console-toast.alert-stream {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: #001105;
            box-shadow: 4px 4px 0px rgba(0, 255, 102, 0.2);
            font-weight: 700;
        }

        .console-toast.fade-out {
            animation: toastExit 0.2s forwards;
        }

        @keyframes toastEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastExit {
            to {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        /* Floating Utilities Bar */
        .fab-container {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            gap: 0px;
            /* Merged block look */
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 0px;
            /* Completely Boxy */
            box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.2);
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }

        .fab-container:hover {
            opacity: 1;
        }

        .floating-btn {
            width: 40px;
            height: 40px;
            background-color: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s;
            outline: none;
            border-radius: 0px;
        }

        /* Simple vertical divider between controls */
        .floating-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }

        .floating-btn:hover {
            background-color: #222222;
        }

        .floating-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: square;
            stroke-linejoin: miter;
        }

        /* Modal Boxy Dialog Box */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 0px;
            /* Completely Boxy */
            padding: 20px;
            width: 90%;
            max-width: 360px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.15);
        }

        .modal-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            box-sizing: border-box;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 0px;
            /* Completely Boxy */
            padding: 8px 10px;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
        }

        .form-group input:focus {
            background: #050505;
            border-color: var(--accent-blue);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-save {
            background: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 0px;
            /* Completely Boxy */
            padding: 8px 14px;
            font-weight: 700;
            font-family: var(--font-mono);
            text-transform: uppercase;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 3px 3px 0px rgba(255, 255, 255, 0.2);
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .btn-save:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .btn-save:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <!-- Overlay Log Output Screen Area -->
    <div id="notification-stack"></div>

    <!-- Fullscreen Borderless Frame Viewport -->
    <div id="fb-live-wrapper" class="video-container"></div>

    <!-- Floating Interface Utilities -->
    <div class="fab-container">
        <button id="open-settings" class="floating-btn" title="EDIT CONFIGURATIONS">
            <svg viewBox="0 0 24 24">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
        </button>
        <button id="manual-refresh" class="floating-btn" title="FORCE REFRESH STREAM CHECK">
            <svg viewBox="0 0 24 24">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
            </svg>
        </button>
    </div>

    <!-- Settings Dialog -->
    <div id="config-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>fb-live-monitor config</h3>
            <div class="form-group">
                <label for="input-proxy">Proxy Base URL</label>
                <input type="text" id="input-proxy" placeholder="https://r.jina.ai/">
            </div>
            <div class="form-group">
                <label for="input-fb-user">Facebook Username</label>
                <input type="text" id="input-fb-user" placeholder="ayaldev">
            </div>
            <div class="modal-actions">
                <button id="btn-save-config" class="btn-save">Save & Apply</button>
            </div>
        </div>
    </div>

    <script>
        let currentVideoId = "";
        let playbackRefreshCooldown = 0;
        let facebookPlaybackTimer = null;

        let proxyBaseUrl = localStorage.getItem('cfg_proxy_base') || "https://r.jina.ai/";
        let fbUsername = localStorage.getItem('cfg_fb_username') || "ayaldev";

        // Console Overlay Logger Utilities
        function pushConsoleLog(message, isAlert = false) {
            const stack = document.getElementById('notification-stack');
            const toast = document.createElement('div');
            toast.className = `console-toast ${isAlert ? 'alert-stream' : ''}`;

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            toast.innerText = `[${timestamp}] ${message}`;

            stack.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                toast.addEventListener('animationend', () => toast.remove());
            }, 5000);
        }

        function triggerPlaybackRefresh(reason, refreshFn) {
            const now = Date.now();
            if (now < playbackRefreshCooldown) return;
            playbackRefreshCooldown = now + 30000;
            pushConsoleLog(`Playback Watch: ${reason}`);
            refreshFn();
        }

        function loadFacebookSdk() {
            if (window.FB) return Promise.resolve();
            return new Promise((resolve, reject) => {
                const existing = document.querySelector('script[src*="connect.facebook.net"]');
                if (existing) {
                    existing.addEventListener('load', () => resolve(), { once: true });
                    existing.addEventListener('error', () => reject(new Error('SDK failed')), { once: true });
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0';
                script.async = true;
                script.defer = true;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('SDK failed'));
                document.head.appendChild(script);
            });
        }

        function watchFacebookPlayback(container, videoId) {
            if (!container) return;
            clearTimeout(facebookPlaybackTimer);
            facebookPlaybackTimer = window.setTimeout(() => {
                const iframe = container.querySelector('iframe');
                if (iframe && iframe.isConnected) {
                    triggerPlaybackRefresh(`Embed ${videoId} stalled`, () => fetchLatestStreamFromJina());
                }
            }, 20000);

            loadFacebookSdk().catch(err => console.warn('SDK configuration error:', err));
        }

        function getStoredVideoId(key) {
            return localStorage.getItem(key) || "";
        }

        function saveStoredVideoId(key, value) {
            if (!value) return;
            localStorage.setItem(key, value);
        }

        function getFormattedTimestamp() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const year = String(now.getFullYear()).slice(-2);
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${month}${day}${year}${hours}${minutes}${seconds}`;
        }

        function triggerAlarmSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.2].forEach((delay) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + delay);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.15);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + delay);
                    osc.stop(audioCtx.currentTime + delay + 0.15);
                });
            } catch (e) {
                console.warn("Audio blocked by layout rules.");
            }
        }

        async function fetchFacebookVideoId() {
            const timestamp = getFormattedTimestamp();
            const base = proxyBaseUrl.endsWith('/') ? proxyBaseUrl : `${proxyBaseUrl}/`;
            const targetUrl = `${base}https://www.facebook.com/${fbUsername}/live_videos?update=${timestamp}`;

            try {
                pushConsoleLog(`Checking endpoint...`);
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error('Network error');

                const pageText = await response.text();
                const matches = pageText.match(/\/videos\/(\d{15,18})/g);

                if (matches && matches.length > 0) {
                    const videoId = matches[0].replace("/videos/", "");
                    if (videoId) return videoId;
                }
            } catch (error) {
                pushConsoleLog(`Fetch failed: Network resource unreachable.`);
            }
            return null;
        }

        async function fetchLatestStreamFromJina() {
            try {
                const latestVideoId = await fetchFacebookVideoId();
                if (latestVideoId) {
                    if (latestVideoId !== currentVideoId) {
                        pushConsoleLog(`🚨 STREAM UPDATED! New ID: ${latestVideoId}`, true);
                        currentVideoId = latestVideoId;
                        saveStoredVideoId('fblive_videoId', latestVideoId);
                        triggerAlarmSound();
                        deployIframe(latestVideoId);
                    } else {
                        pushConsoleLog("Check complete: Matches cache.");
                    }
                } else {
                    pushConsoleLog("Check complete: No active stream.");
                }
            } catch (error) {
                pushConsoleLog("Parsing loop error.");
            }
        }

        function deployIframe(id) {
            const container = document.getElementById('fb-live-wrapper');
            if (!id) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = `
                <iframe 
                    src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2F${fbUsername}%2Fvideos%2F${id}%2F&show_text=false&width=560&t=0&autoplay=true&mute=true" 
                    scrolling="no" 
                    frameborder="0" 
                    allowfullscreen="true" 
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                </iframe>
            `;
            watchFacebookPlayback(container, id);
        }

        function runTimeTicker() {
            const now = new Date();
            if (now.getMinutes() % 5 === 0 && now.getSeconds() === 0) {
                fetchLatestStreamFromJina();
            }
        }

        const modal = document.getElementById('config-modal');
        const inputProxy = document.getElementById('input-proxy');
        const inputFbUser = document.getElementById('input-fb-user');

        function openModal() {
            inputProxy.value = proxyBaseUrl;
            inputFbUser.value = fbUsername;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        document.getElementById('open-settings').addEventListener('click', openModal);

        document.getElementById('btn-save-config').addEventListener('click', () => {
            proxyBaseUrl = inputProxy.value.trim() || "https://r.jina.ai/";
            fbUsername = inputFbUser.value.trim() || "ayaldev";

            localStorage.setItem('cfg_proxy_base', proxyBaseUrl);
            localStorage.setItem('cfg_fb_username', fbUsername);

            closeModal();
            pushConsoleLog(`Config updated target -> ${fbUsername}`);
            fetchLatestStreamFromJina();
        });

        document.getElementById('manual-refresh').addEventListener('click', () => {
            fetchLatestStreamFromJina();
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('cfg_proxy_base') || !localStorage.getItem('cfg_fb_username')) {
                openModal();
            }

            currentVideoId = getStoredVideoId('fblive_videoId');
            if (currentVideoId) {
                deployIframe(currentVideoId);
            }
            fetchLatestStreamFromJina();
            setInterval(runTimeTicker, 1000);
        });
    </script>
</body>

</html>
